<h1>Reactive Enrollment Form</h1><form class="panel" [formGroup]="enrollForm" (ngSubmit)="onSubmit()"><label>Name</label><input formControlName="studentName"><span class="error" *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.invalid">Name must be at least 3 characters.</span><label>Email</label><input formControlName="studentEmail"><span class="error" *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">Email taken</span><label>Course Code</label><input formControlName="courseId"><span class="error" *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">Course code starting with XX is not allowed.</span><label>Preferred Semester</label><select formControlName="preferredSemester"><option>Odd</option><option>Even</option></select><label><input type="checkbox" formControlName="agreeToTerms"> I agree to terms</label><h3>Additional Courses</h3><button type="button" (click)="addCourse()">Add Another Course</button><div formArrayName="additionalCourses"><div *ngFor="let ctrl of additionalCourses.controls; let i=index"><input [formControl]="ctrl"><button type="button" (click)="removeCourse(i)">Remove</button></div></div><button type="submit" [disabled]="enrollForm.invalid">Submit</button></form>
