<h1>Template-Driven Enrollment Request</h1><form class="panel" #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)"><label>Name</label><input name="studentName" [(ngModel)]="model.studentName" required minlength="3" #nameCtrl="ngModel"><span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">Name is required</span><span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">Name must be at least 3 characters</span><label>Email</label><input type="email" name="studentEmail" [(ngModel)]="model.studentEmail" required email #emailCtrl="ngModel"><span class="error" *ngIf="emailCtrl.touched && emailCtrl.invalid">Valid email is required</span><label>Course ID</label><input type="number" name="courseId" [(ngModel)]="model.courseId" required #courseCtrl="ngModel"><span class="error" *ngIf="courseCtrl.touched && courseCtrl.invalid">Course ID is required</span><label>Preferred Semester</label><select name="preferredSemester" [(ngModel)]="model.preferredSemester" required><option>Odd</option><option>Even</option></select><label><input type="checkbox" name="agreeToTerms" [(ngModel)]="model.agreeToTerms" required #termsCtrl="ngModel"> I agree to terms</label><span class="error" *ngIf="termsCtrl.touched && termsCtrl.invalid">Terms must be accepted</span><button type="submit" [disabled]="enrollForm.invalid">Submit</button><button type="button" (click)="enrollForm.resetForm(); submitted=false">Reset</button><div class="success" *ngIf="submitted">Enrollment request submitted successfully!</div></form>
